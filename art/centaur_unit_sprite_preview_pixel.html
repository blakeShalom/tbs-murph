<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Centaur Pixel Sprite Preview</title>
  <style>
    :root {
      color-scheme: only light;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #263341 0%, #101820 65%);
      font-family: "Courier New", Courier, monospace;
      color: #e7d4a4;
    }

    .frame {
      border: 2px solid #8a7040;
      border-radius: 10px;
      background: #0f1720;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.45);
      padding: 10px;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="frame">
    <canvas id="sheet" width="1280" height="720"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("sheet");
    const ctx = canvas.getContext("2d", { alpha: true });
    ctx.imageSmoothingEnabled = false;

    const PIXEL = 4;
    const SPRITE_W = 36;
    const SPRITE_H = 32;

    const units = [
      {
        name: "Recon",
        subtitle: "thin • shortbow • sword",
        coat: "#8a6543",
        torso: "#b48f66",
        armor: "#8f8c78",
        mane: "#5b3b26",
        weapon: "shortbow+sword"
      },
      {
        name: "Brute",
        subtitle: "plate • 2h axe",
        coat: "#6a503b",
        torso: "#7a6450",
        armor: "#bdc3c9",
        mane: "#2f251d",
        weapon: "greataxe"
      },
      {
        name: "Marksman",
        subtitle: "longbow • sword • leather",
        coat: "#7a5d41",
        torso: "#9a7a5c",
        armor: "#916b49",
        mane: "#4e3321",
        weapon: "longbow+sword"
      },
      {
        name: "Captain",
        subtitle: "white coat • long axe",
        coat: "#ddd7cc",
        torso: "#ece7dc",
        armor: "#8f9791",
        mane: "#f3f1ea",
        weapon: "poleaxe"
      }
    ];

    function pxRect(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * PIXEL, y * PIXEL, w * PIXEL, h * PIXEL);
    }

    function px(x, y, color) {
      pxRect(x, y, 1, 1, color);
    }

    function pxText(text, x, y, size, color) {
      ctx.fillStyle = color;
      ctx.font = `${size}px "Courier New", monospace`;
      ctx.textAlign = "center";
      ctx.fillText(text, x, y);
    }

    function drawBackground() {
      const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
      g.addColorStop(0, "#2a3a46");
      g.addColorStop(1, "#101820");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "rgba(230, 210, 158, 0.08)";
      for (let x = 0; x < canvas.width; x += 16) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += 16) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
    }

    function drawSprite(originX, originY, unit) {
      const ox = originX;
      const oy = originY;

      // shadow
      pxRect(ox + 6, oy + 28, 23, 3, "rgba(7, 11, 14, 0.55)");

      // horse body
      pxRect(ox + 8, oy + 16, 20, 8, unit.coat);
      pxRect(ox + 5, oy + 17, 6, 5, unit.coat);
      pxRect(ox + 23, oy + 18, 8, 5, unit.coat);
      pxRect(ox + 8, oy + 19, 9, 4, "rgba(50, 33, 21, 0.45)");

      // legs
      pxRect(ox + 9, oy + 24, 3, 7, unit.coat);
      pxRect(ox + 14, oy + 24, 3, 7, unit.coat);
      pxRect(ox + 20, oy + 24, 3, 7, unit.coat);
      pxRect(ox + 25, oy + 24, 3, 7, unit.coat);

      // tail
      pxRect(ox + 2, oy + 19, 3, 4, unit.mane);
      pxRect(ox + 1, oy + 20, 2, 4, unit.mane);

      // torso + head
      pxRect(ox + 16, oy + 9, 7, 8, unit.torso);
      pxRect(ox + 18, oy + 5, 4, 4, unit.torso);
      pxRect(ox + 18, oy + 4, 4, 2, unit.mane);

      // armor variation
      if (unit.name === "Brute") {
        pxRect(ox + 15, oy + 8, 9, 8, unit.armor);
        pxRect(ox + 13, oy + 10, 13, 4, unit.armor);
        pxRect(ox + 17, oy + 4, 6, 2, unit.armor);
      } else if (unit.name === "Marksman") {
        pxRect(ox + 15, oy + 10, 9, 6, unit.armor);
      } else if (unit.name === "Captain") {
        pxRect(ox + 15, oy + 9, 9, 7, unit.armor);
        pxRect(ox + 14, oy + 11, 11, 4, unit.armor);
        pxRect(ox + 9, oy + 25, 3, 6, "#c2c7c8");
        pxRect(ox + 14, oy + 25, 3, 6, "#c2c7c8");
        pxRect(ox + 20, oy + 25, 3, 6, "#c2c7c8");
        pxRect(ox + 25, oy + 25, 3, 6, "#c2c7c8");
      } else {
        pxRect(ox + 16, oy + 11, 7, 4, unit.armor);
      }

      // right arm
      pxRect(ox + 22, oy + 11, 3, 2, unit.torso);

      if (unit.weapon.includes("bow")) {
        const longbow = unit.weapon.startsWith("long");
        pxRect(ox + 25, oy + 9, 1, 8, "#d5b17a");
        pxRect(ox + 26, oy + 8, 1, longbow ? 10 : 8, "#d5b17a");
        pxRect(ox + 27, oy + 9, 1, 8, "#d5b17a");

        pxRect(ox + 26, oy + 8, 1, 1, "#f0e8d3");
        pxRect(ox + 26, oy + 16, 1, 1, "#f0e8d3");

        // arrow
        pxRect(ox + 23, oy + 12, longbow ? 8 : 6, 1, "#efe2c2");
        px(ox + (longbow ? 31 : 29), oy + 12, "#bcc2c8");
      }

      if (unit.weapon.includes("sword")) {
        pxRect(ox + 21, oy + 14, 4, 1, "#d4d9de");
        pxRect(ox + 24, oy + 15, 1, 3, "#d4d9de");
        pxRect(ox + 20, oy + 14, 1, 2, "#9a7d4e");
      }

      if (unit.weapon === "greataxe" || unit.weapon === "poleaxe") {
        const long = unit.weapon === "poleaxe";
        pxRect(ox + 24, oy + 10, 1, long ? 12 : 10, "#7a5b3c");
        pxRect(ox + 25, oy + 12, 1, long ? 12 : 9, "#7a5b3c");
        pxRect(ox + 22, oy + 9, 3, 2, "#c2c8ce");
        pxRect(ox + 20, oy + 8, 2, 3, "#c2c8ce");
      }

      // outline touch
      for (let x = 7; x <= 31; x += 1) px(ox + x, oy + 24, "rgba(22, 18, 15, 0.22)");
    }

    function drawCard(i, unit) {
      const cardW = 300;
      const cardH = 620;
      const gap = 14;
      const x = 22 + i * (cardW + gap);
      const y = 42;

      const frameGrad = ctx.createLinearGradient(x, y, x, y + cardH);
      frameGrad.addColorStop(0, "#c8b083");
      frameGrad.addColorStop(1, "#7f663d");
      ctx.fillStyle = frameGrad;
      ctx.fillRect(x, y, cardW, cardH);

      ctx.fillStyle = "#141d26";
      ctx.fillRect(x + 4, y + 4, cardW - 8, cardH - 8);

      const panelGrad = ctx.createLinearGradient(x, y + 84, x, y + cardH - 18);
      panelGrad.addColorStop(0, "#5b6d73");
      panelGrad.addColorStop(1, "#284239");
      ctx.fillStyle = panelGrad;
      ctx.fillRect(x + 16, y + 90, cardW - 32, cardH - 112);

      pxText(unit.name, x + cardW / 2, y + 45, 42, "#e6d7b2");
      pxText(unit.subtitle, x + cardW / 2, y + 72, 16, "#d2c39f");

      // enlarged pixel sprite
      const spriteX = Math.floor((x + cardW / 2 - (SPRITE_W * PIXEL) / 2) / PIXEL);
      const spriteY = Math.floor((y + 260) / PIXEL);
      drawSprite(spriteX, spriteY, unit);

      // sprite shadow plate
      const plateW = SPRITE_W * PIXEL + 28;
      const plateH = SPRITE_H * PIXEL + 24;
      const px0 = x + (cardW - plateW) / 2;
      const py0 = y + 238;
      ctx.fillStyle = "rgba(13, 17, 20, 0.45)";
      ctx.fillRect(px0, py0, plateW, plateH);
      ctx.strokeStyle = "rgba(152, 124, 72, 0.85)";
      ctx.strokeRect(px0, py0, plateW, plateH);
    }

    drawBackground();
    units.forEach((u, i) => drawCard(i, u));
  </script>
</body>
</html>
