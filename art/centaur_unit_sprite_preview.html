<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Centaur Unit Sprite Preview</title>
  <style>
    :root {
      color-scheme: only light;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #2f3d45 0%, #11191e 68%);
      font-family: Georgia, "Times New Roman", serif;
      color: #e6d7b4;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }

    .sheet {
      border: 2px solid #8d7446;
      border-radius: 12px;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.45);
      background: #10161a;
      padding: 10px;
    }

    canvas {
      display: block;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="sheet">
    <canvas id="spriteSheet" width="1200" height="640"></canvas>
  </div>
  <script>
    const canvas = document.getElementById("spriteSheet");
    const ctx = canvas.getContext("2d");

    const units = [
      {
        name: "Recon",
        subtitle: "Thin build, short bow, light sword",
        coat: "#8f6a49",
        torso: "#9f7d5f",
        armor: "#8e876f",
        accent: "#d8c79c",
        mane: "#5b3b24",
        weapon: "shortbow+sword",
        bodyScale: 0.88
      },
      {
        name: "Brute",
        subtitle: "Plate armor, two-handed axe",
        coat: "#694f39",
        torso: "#7e6754",
        armor: "#b8bcc0",
        accent: "#f0d89c",
        mane: "#332418",
        weapon: "greataxe",
        bodyScale: 1.08
      },
      {
        name: "Marksman",
        subtitle: "Longbow, short sword, leather armor",
        coat: "#765b3f",
        torso: "#8f7256",
        armor: "#936f4a",
        accent: "#ecd0a0",
        mane: "#4a301f",
        weapon: "longbow+sword",
        bodyScale: 0.96
      },
      {
        name: "Captain",
        subtitle: "White coat, medium armor, long axe",
        coat: "#d8d4cb",
        torso: "#e5e1d6",
        armor: "#8f968f",
        accent: "#f4e7c0",
        mane: "#f6f4ee",
        weapon: "poleaxe",
        bodyScale: 1
      }
    ];

    function drawBackground() {
      const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
      g.addColorStop(0, "#2e4048");
      g.addColorStop(0.55, "#1c2a30");
      g.addColorStop(1, "#152026");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "rgba(230, 210, 165, 0.09)";
      for (let x = 32; x < canvas.width; x += 32) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 32; y < canvas.height; y += 32) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
    }

    function drawCard(unit, i) {
      const cardW = 278;
      const cardH = 560;
      const gap = 20;
      const x = 24 + i * (cardW + gap);
      const y = 40;

      const cardGrad = ctx.createLinearGradient(x, y, x, y + cardH);
      cardGrad.addColorStop(0, "#c6b189");
      cardGrad.addColorStop(1, "#7d6340");
      ctx.fillStyle = cardGrad;
      ctx.fillRect(x, y, cardW, cardH);

      ctx.fillStyle = "rgba(17, 23, 24, 0.72)";
      ctx.fillRect(x + 5, y + 5, cardW - 10, cardH - 10);

      const panelGrad = ctx.createLinearGradient(x, y + 76, x, y + cardH - 16);
      panelGrad.addColorStop(0, "#54656c");
      panelGrad.addColorStop(0.55, "#3e5148");
      panelGrad.addColorStop(1, "#253630");
      ctx.fillStyle = panelGrad;
      ctx.fillRect(x + 14, y + 78, cardW - 28, cardH - 94);

      ctx.fillStyle = "#e7d8b5";
      ctx.font = "700 33px Georgia, serif";
      ctx.textAlign = "center";
      ctx.fillText(unit.name, x + cardW / 2, y + 48);
      ctx.font = "15px Georgia, serif";
      ctx.fillStyle = "#d8caa8";
      ctx.fillText(unit.subtitle, x + cardW / 2, y + 68);

      drawCentaur(unit, x + cardW / 2, y + 318);
    }

    function drawCentaur(unit, cx, cy) {
      const s = unit.bodyScale;
      const horseColor = unit.coat;
      const torsoColor = unit.torso;
      const armorColor = unit.armor;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(s, s);

      ctx.fillStyle = "rgba(0, 0, 0, 0.26)";
      ctx.beginPath();
      ctx.ellipse(-10, 82, 74, 22, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = horseColor;
      ctx.beginPath();
      ctx.ellipse(-8, 35, 66, 34, -0.02, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = unit.mane;
      ctx.beginPath();
      ctx.ellipse(-19, 38, 34, 20, 0.08, 0, Math.PI * 2);
      ctx.fill();

      const legs = [-58, -27, 3, 34];
      ctx.fillStyle = horseColor;
      for (const lx of legs) {
        ctx.fillRect(lx, 54, 13, 56);
      }

      if (unit.name === "Captain") {
        ctx.fillStyle = "#bcc2bf";
        ctx.fillRect(-58, 88, 13, 22);
        ctx.fillRect(-27, 86, 13, 24);
        ctx.fillRect(3, 87, 13, 23);
        ctx.fillRect(34, 89, 13, 21);
      }

      ctx.strokeStyle = unit.mane;
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(-71, 30);
      ctx.quadraticCurveTo(-94, 48, -104, 70);
      ctx.stroke();

      ctx.fillStyle = torsoColor;
      ctx.fillRect(-18, -14, 40, 54);
      ctx.fillStyle = unit.accent;
      ctx.beginPath();
      ctx.arc(4, -27, 16, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = unit.mane;
      ctx.beginPath();
      ctx.arc(0, -31, 10, Math.PI * 0.87, Math.PI * 2.13);
      ctx.fill();

      ctx.fillStyle = armorColor;
      if (unit.name === "Brute") {
        ctx.fillRect(-21, -16, 46, 42);
        ctx.fillRect(-29, 8, 62, 25);
        ctx.fillRect(-26, -32, 52, 12);
      } else if (unit.name === "Marksman") {
        ctx.fillRect(-19, -9, 42, 36);
      } else if (unit.name === "Captain") {
        ctx.fillRect(-20, -10, 44, 36);
        ctx.fillRect(-28, 12, 58, 20);
      } else {
        ctx.fillRect(-14, 1, 34, 16);
      }

      ctx.strokeStyle = unit.accent;
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(18, -8);
      ctx.lineTo(42, 9);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(-9, -8);
      ctx.lineTo(12, 13);
      ctx.stroke();

      drawWeapon(unit);
      ctx.restore();
    }

    function drawWeapon(unit) {
      if (unit.weapon.includes("bow")) {
        const long = unit.weapon.startsWith("long");
        ctx.strokeStyle = "#d6b47f";
        ctx.lineWidth = long ? 5 : 4;
        ctx.beginPath();
        ctx.arc(66, 0, long ? 24 : 17, Math.PI * 0.42, Math.PI * 1.59, true);
        ctx.stroke();

        ctx.strokeStyle = "#f1e8cf";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(58, long ? -18 : -13);
        ctx.lineTo(59, long ? 17 : 13);
        ctx.stroke();

        ctx.strokeStyle = "#f0e3bf";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(37, -2);
        ctx.lineTo(long ? 102 : 87, -5);
        ctx.stroke();

        ctx.fillStyle = "#bdc1c4";
        ctx.beginPath();
        ctx.moveTo(long ? 102 : 87, -5);
        ctx.lineTo(long ? 94 : 79, -9);
        ctx.lineTo(long ? 94 : 79, -1);
        ctx.closePath();
        ctx.fill();
      }

      if (unit.weapon.includes("sword")) {
        ctx.strokeStyle = "#d7dadf";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(13, 13);
        ctx.lineTo(35, 35);
        ctx.stroke();
        ctx.fillStyle = "#9f8358";
        ctx.fillRect(7, 8, 10, 9);
      }

      if (unit.weapon === "greataxe" || unit.weapon === "poleaxe") {
        const poleLen = unit.weapon === "greataxe" ? 70 : 90;
        ctx.strokeStyle = "#7f603f";
        ctx.lineWidth = unit.weapon === "greataxe" ? 6 : 5;
        ctx.beginPath();
        ctx.moveTo(26, -4);
        ctx.lineTo(76, poleLen - 20);
        ctx.stroke();

        ctx.fillStyle = "#c5cbcf";
        ctx.beginPath();
        ctx.moveTo(18, -9);
        ctx.lineTo(43, -24);
        ctx.lineTo(56, 0);
        ctx.lineTo(30, 8);
        ctx.closePath();
        ctx.fill();
      }
    }

    drawBackground();
    units.forEach(drawCard);
  </script>
</body>
</html>
