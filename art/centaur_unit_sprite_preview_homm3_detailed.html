<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Centaur HOMM3 Detailed Preview</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #2a3e4b 0%, #0e151d 66%);
      font-family: Georgia, serif;
      color: #e8d8b3;
    }

    .frame {
      border: 2px solid #86683b;
      border-radius: 12px;
      padding: 10px;
      background: #0f1821;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.5);
    }

    canvas {
      display: block;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="frame">
    <canvas id="sheet" width="1480" height="920"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("sheet");
    const ctx = canvas.getContext("2d");

    const units = [
      {
        name: "Recon",
        subtitle: "thin • shortbow • sword",
        horse: "#8f6746",
        horseShade: "#5b3d27",
        skin: "#c49a71",
        armor: "#8a8e84",
        mane: "#523825",
        plume: "#8c7b5d",
        weapon: "shortbow+sword"
      },
      {
        name: "Brute",
        subtitle: "plate • 2h axe",
        horse: "#70533f",
        horseShade: "#452f22",
        skin: "#b08862",
        armor: "#bfc5cd",
        mane: "#2f251e",
        plume: "#d9dde2",
        weapon: "greataxe"
      },
      {
        name: "Marksman",
        subtitle: "longbow • sword • leather",
        horse: "#7a5f44",
        horseShade: "#4c3426",
        skin: "#bb936b",
        armor: "#916d4b",
        mane: "#493121",
        plume: "#a18661",
        weapon: "longbow+sword"
      },
      {
        name: "Captain",
        subtitle: "white coat • long axe",
        horse: "#e1dbd0",
        horseShade: "#a6a8a8",
        skin: "#d9c3a4",
        armor: "#88928b",
        mane: "#f1eee6",
        plume: "#f5f4ef",
        weapon: "poleaxe"
      }
    ];

    function drawBackdrop() {
      const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
      g.addColorStop(0, "#314756");
      g.addColorStop(1, "#121b24");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "rgba(224, 201, 151, 0.06)";
      for (let x = 10; x < canvas.width; x += 16) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 10; y < canvas.height; y += 16) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
    }

    function drawSprite(unit, w = 280, h = 240) {
      const sprite = document.createElement("canvas");
      sprite.width = w;
      sprite.height = h;
      const s = sprite.getContext("2d");

      // shadow
      s.fillStyle = "rgba(8, 11, 15, 0.35)";
      s.beginPath();
      s.ellipse(130, 198, 98, 24, -0.06, 0, Math.PI * 2);
      s.fill();

      // horse body gradient
      const horseBody = s.createLinearGradient(68, 96, 210, 188);
      horseBody.addColorStop(0, unit.horse);
      horseBody.addColorStop(1, unit.horseShade);
      s.fillStyle = horseBody;
      s.beginPath();
      s.ellipse(136, 132, 78, 42, -0.05, 0, Math.PI * 2);
      s.fill();

      // chest and hind muscles
      s.fillStyle = "rgba(245, 223, 184, 0.1)";
      s.beginPath();
      s.ellipse(98, 125, 28, 20, -0.15, 0, Math.PI * 2);
      s.fill();
      s.beginPath();
      s.ellipse(168, 139, 30, 22, 0.18, 0, Math.PI * 2);
      s.fill();

      // belly shade
      s.fillStyle = "rgba(28, 20, 14, 0.35)";
      s.beginPath();
      s.ellipse(135, 148, 62, 21, 0, 0, Math.PI * 2);
      s.fill();

      // neck and tail
      s.strokeStyle = unit.horseShade;
      s.lineWidth = 8;
      s.beginPath();
      s.moveTo(66, 126);
      s.quadraticCurveTo(43, 136, 28, 166);
      s.stroke();

      // legs
      function drawLeg(x, y, width, height, kneeShift) {
        const grad = s.createLinearGradient(x, y, x, y + height);
        grad.addColorStop(0, unit.horse);
        grad.addColorStop(1, unit.horseShade);
        s.fillStyle = grad;
        s.beginPath();
        s.moveTo(x, y);
        s.lineTo(x + width, y + kneeShift);
        s.lineTo(x + width - 3, y + height);
        s.lineTo(x - 2, y + height);
        s.closePath();
        s.fill();

        s.fillStyle = "#1a2027";
        s.fillRect(x - 1, y + height - 4, width + 2, 5);
      }

      drawLeg(82, 156, 17, 54, 6);
      drawLeg(110, 158, 18, 52, 4);
      drawLeg(144, 157, 18, 54, 5);
      drawLeg(172, 154, 19, 57, 7);

      // horse plate / cloth
      if (unit.name === "Brute") {
        s.fillStyle = "rgba(195, 200, 208, 0.92)";
        s.fillRect(92, 112, 88, 40);
        s.fillRect(84, 132, 104, 20);
      } else if (unit.name === "Captain") {
        s.fillStyle = "rgba(142, 151, 143, 0.92)";
        s.fillRect(96, 117, 82, 34);
        s.fillRect(90, 134, 94, 16);
      } else if (unit.name === "Marksman") {
        s.fillStyle = "rgba(146, 108, 72, 0.85)";
        s.fillRect(98, 120, 72, 26);
      }

      // torso
      const torso = s.createLinearGradient(113, 66, 148, 138);
      torso.addColorStop(0, unit.skin);
      torso.addColorStop(1, "#8d694d");
      s.fillStyle = torso;
      s.fillRect(114, 70, 38, 60);

      // head
      const head = s.createLinearGradient(118, 42, 146, 72);
      head.addColorStop(0, unit.skin);
      head.addColorStop(1, "#947053");
      s.fillStyle = head;
      s.beginPath();
      s.ellipse(134, 51, 16, 18, 0.12, 0, Math.PI * 2);
      s.fill();

      // hair and helm detail
      s.fillStyle = unit.mane;
      s.beginPath();
      s.arc(129, 44, 10, Math.PI * 0.9, Math.PI * 2.1);
      s.fill();

      // chest armor
      if (unit.name === "Brute") {
        s.fillStyle = "rgba(190, 198, 208, 0.95)";
        s.fillRect(108, 66, 50, 42);
        s.fillRect(103, 85, 58, 23);
        s.fillRect(118, 40, 30, 8);
      } else if (unit.name === "Marksman") {
        s.fillStyle = "rgba(144, 108, 73, 0.88)";
        s.fillRect(110, 76, 45, 34);
      } else if (unit.name === "Captain") {
        s.fillStyle = "rgba(139, 150, 141, 0.92)";
        s.fillRect(109, 74, 47, 36);
        s.fillRect(104, 90, 56, 18);
      } else {
        s.fillStyle = "rgba(146, 144, 129, 0.82)";
        s.fillRect(114, 86, 32, 19);
      }

      // arm and hand
      s.strokeStyle = unit.skin;
      s.lineWidth = 7;
      s.beginPath();
      s.moveTo(149, 90);
      s.lineTo(170, 102);
      s.moveTo(120, 88);
      s.lineTo(142, 103);
      s.stroke();

      // weapons
      if (unit.weapon.includes("bow")) {
        const long = unit.weapon.startsWith("long");
        s.strokeStyle = "#d6b07a";
        s.lineWidth = 4;
        s.beginPath();
        s.arc(188, 102, long ? 24 : 17, Math.PI * 0.45, Math.PI * 1.58, true);
        s.stroke();

        s.strokeStyle = "#efe6cd";
        s.lineWidth = 1.5;
        s.beginPath();
        s.moveTo(180, long ? 80 : 86);
        s.lineTo(181, long ? 123 : 118);
        s.stroke();

        s.strokeStyle = "#f0dfbb";
        s.lineWidth = 3;
        s.beginPath();
        s.moveTo(165, 99);
        s.lineTo(long ? 221 : 206, 96);
        s.stroke();

        s.fillStyle = "#bec4ca";
        s.beginPath();
        s.moveTo(long ? 221 : 206, 96);
        s.lineTo(long ? 213 : 198, 92);
        s.lineTo(long ? 213 : 198, 100);
        s.closePath();
        s.fill();
      }

      if (unit.weapon.includes("sword")) {
        s.strokeStyle = "#d6dce3";
        s.lineWidth = 3.6;
        s.beginPath();
        s.moveTo(144, 102);
        s.lineTo(166, 124);
        s.stroke();
        s.fillStyle = "#9d8252";
        s.fillRect(139, 98, 8, 7);
      }

      if (unit.weapon === "greataxe" || unit.weapon === "poleaxe") {
        const long = unit.weapon === "poleaxe";
        s.strokeStyle = "#7b5d3e";
        s.lineWidth = long ? 5 : 6;
        s.beginPath();
        s.moveTo(160, 94);
        s.lineTo(208, long ? 176 : 162);
        s.stroke();

        s.fillStyle = "#c2c8cf";
        s.beginPath();
        s.moveTo(153, 87);
        s.lineTo(178, 73);
        s.lineTo(191, 94);
        s.lineTo(167, 102);
        s.closePath();
        s.fill();
      }

      // detail rim
      s.strokeStyle = "rgba(240, 230, 204, 0.28)";
      s.lineWidth = 1;
      s.strokeRect(2, 2, w - 4, h - 4);

      return sprite;
    }

    function drawCard(i, unit) {
      const cardW = 354;
      const cardH = 812;
      const gap = 14;
      const x = 16 + i * (cardW + gap);
      const y = 52;

      const frame = ctx.createLinearGradient(x, y, x, y + cardH);
      frame.addColorStop(0, "#c7b186");
      frame.addColorStop(1, "#7a603a");
      ctx.fillStyle = frame;
      ctx.fillRect(x, y, cardW, cardH);

      ctx.fillStyle = "#101923";
      ctx.fillRect(x + 5, y + 5, cardW - 10, cardH - 10);

      const panel = ctx.createLinearGradient(x, y + 110, x, y + cardH - 18);
      panel.addColorStop(0, "#617781");
      panel.addColorStop(1, "#2a473b");
      ctx.fillStyle = panel;
      ctx.fillRect(x + 18, y + 118, cardW - 36, cardH - 138);

      ctx.fillStyle = "#e9d9b6";
      ctx.font = "bold 64px Georgia, serif";
      ctx.textAlign = "center";
      ctx.fillText(unit.name, x + cardW / 2, y + 68);

      ctx.fillStyle = "#d8c8a4";
      ctx.font = "24px Georgia, serif";
      ctx.fillText(unit.subtitle, x + cardW / 2, y + 104);

      const sprite = drawSprite(unit, 284, 244);
      const sx = x + Math.floor((cardW - 284) / 2);
      const sy = y + 290;

      ctx.fillStyle = "rgba(12, 18, 21, 0.58)";
      ctx.fillRect(sx - 16, sy - 14, 316, 272);
      ctx.strokeStyle = "rgba(149, 120, 70, 0.9)";
      ctx.strokeRect(sx - 16, sy - 14, 316, 272);

      ctx.drawImage(sprite, sx, sy);
    }

    drawBackdrop();
    units.forEach((u, i) => drawCard(i, u));
  </script>
</body>
</html>
